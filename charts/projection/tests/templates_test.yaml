suite: Chart template rendering
templates:
  - servicemonitor.yaml
  - networkpolicy.yaml
  - poddisruptionbudget.yaml
  - deployment.yaml

tests:
  - it: renders no ServiceMonitor by default
    template: servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ServiceMonitor when enabled
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].port
          value: https
      - equal:
          path: spec.endpoints[0].scheme
          value: https
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.namespaceSelector.matchNames[0]
          value: NAMESPACE
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 10s
      - equal:
          path: spec.endpoints[0].tlsConfig.insecureSkipVerify
          value: true

  - it: renders no NetworkPolicy by default
    template: networkpolicy.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders NetworkPolicy with egress-only policyTypes when enabled
    template: networkpolicy.yaml
    set:
      networkPolicy.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.policyTypes
          value:
            - Egress
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: UDP
            port: 53
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: TCP
            port: 443
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 0.0.0.0/0

  - it: renders no PodDisruptionBudget by default
    template: poddisruptionbudget.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders PodDisruptionBudget with minAvailable when enabled
    template: poddisruptionbudget.yaml
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable

  - it: passes --requeue-interval to the controller (default 30s)
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --requeue-interval=30s

  - it: passes --leader-election-lease-duration by default (leader election enabled)
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-election-lease-duration=15s

  - it: omits --leader-election-lease-duration when leader election disabled
    template: deployment.yaml
    set:
      leaderElection.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --leader-election-lease-duration=15s
