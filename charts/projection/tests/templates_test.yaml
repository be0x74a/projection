suite: Chart template rendering
templates:
  - servicemonitor.yaml
  - networkpolicy.yaml
  - poddisruptionbudget.yaml
  - deployment.yaml
  - clusterrole.yaml
  - clusterrole-namespaced-edit.yaml
  - clusterrole-namespaced-view.yaml
  - clusterrole-cluster-admin.yaml

tests:
  - it: renders no ServiceMonitor by default
    template: servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ServiceMonitor when enabled
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].port
          value: https
      - equal:
          path: spec.endpoints[0].scheme
          value: https
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.namespaceSelector.matchNames[0]
          value: NAMESPACE
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 10s
      - equal:
          path: spec.endpoints[0].tlsConfig.insecureSkipVerify
          value: true

  - it: renders no NetworkPolicy by default
    template: networkpolicy.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders NetworkPolicy with egress-only policyTypes when enabled
    template: networkpolicy.yaml
    set:
      networkPolicy.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.policyTypes
          value:
            - Egress
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: UDP
            port: 53
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: TCP
            port: 443
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 0.0.0.0/0

  - it: renders no PodDisruptionBudget by default
    template: poddisruptionbudget.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders PodDisruptionBudget with minAvailable when enabled
    template: poddisruptionbudget.yaml
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable

  - it: passes --requeue-interval to the controller (default 30s)
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --requeue-interval=30s

  - it: passes --selector-write-concurrency to the controller (default 16)
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --selector-write-concurrency=16

  - it: honors a non-default selectorWriteConcurrency
    template: deployment.yaml
    set:
      selectorWriteConcurrency: 64
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --selector-write-concurrency=64

  - it: passes --leader-election-lease-duration by default (leader election enabled)
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-election-lease-duration=15s

  - it: omits --leader-election-lease-duration when leader election disabled
    template: deployment.yaml
    set:
      leaderElection.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --leader-election-lease-duration=15s

  - it: renders default broad-wildcard ClusterRole rule
    template: clusterrole.yaml
    asserts:
      - isKind:
          of: ClusterRole
      # The first rule is the user-configurable range output. With the
      # default values (single wildcard entry), it matches the pre-v0.2
      # hand-written */* rule 1:1.
      - equal:
          path: rules[0].apiGroups
          value: ["*"]
      - equal:
          path: rules[0].resources
          value: ["*"]
      - equal:
          path: rules[0].verbs
          value: [create, delete, get, list, patch, update, watch]
      # Projection-own rules cover both projections and clusterprojections.
      - equal:
          path: rules[1].apiGroups
          value: [projection.sh]
      - equal:
          path: rules[1].resources
          value: [clusterprojections, projections]

  - it: renders no broad rule when supportedKinds is empty
    template: clusterrole.yaml
    set:
      supportedKinds: []
    asserts:
      - isKind:
          of: ClusterRole
      # First rule is now the projection.sh rule — no broad entry.
      - equal:
          path: rules[0].apiGroups
          value: [projection.sh]
      - equal:
          path: rules[0].resources
          value: [clusterprojections, projections]
      # Four rules total (3 projection.sh own-rules + 1 namespaces read,
      # 0 user-config rules).
      - lengthEqual:
          path: rules
          count: 4

  - it: renders narrow ClusterRole rules from supportedKinds
    template: clusterrole.yaml
    set:
      supportedKinds:
        - apiGroup: ""
          resources: [configmaps, secrets]
        - apiGroup: apps
          resources: [deployments]
    asserts:
      - isKind:
          of: ClusterRole
      - lengthEqual:
          path: rules
          count: 6
      - equal:
          path: rules[0].apiGroups
          value: [""]
      - equal:
          path: rules[0].resources
          value: [configmaps, secrets]
      - equal:
          path: rules[1].apiGroups
          value: [apps]
      - equal:
          path: rules[1].resources
          value: [deployments]
      # Own-rules remain after the user-config rules.
      - equal:
          path: rules[2].apiGroups
          value: [projection.sh]

  - it: renders wildcard resources for a trusted apiGroup
    template: clusterrole.yaml
    set:
      supportedKinds:
        - apiGroup: projection.sh
          resources: ["*"]
    asserts:
      - equal:
          path: rules[0].apiGroups
          value: [projection.sh]
      - equal:
          path: rules[0].resources
          value: ["*"]
      - lengthEqual:
          path: rules
          count: 5

  - it: includes namespaces read access in the ClusterRole
    template: clusterrole.yaml
    asserts:
      - isKind:
          of: ClusterRole
      # The cluster-scoped reconciler must read namespaces to evaluate
      # destination namespaceSelectors.
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [namespaces]
            verbs: [get, list, watch]

  # --- Aggregated end-user ClusterRoles -----------------------------------
  # rbac.aggregate=true (the default) ships three ClusterRoles so namespace
  # tenants automatically inherit Projection CRUD via the standard
  # admin/edit/view aggregation, while ClusterProjection access stays
  # explicitly cluster-tier gated.

  - it: renders the namespaced-edit ClusterRole with both admin and edit aggregation labels
    template: clusterrole-namespaced-edit.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-projection-namespaced-edit
      - equal:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-admin"]
          value: "true"
      - equal:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-edit"]
          value: "true"
      # Edit-tier role must NOT carry the view label (view is a strict
      # subset of edit, so adding it would be redundant but we still want
      # to guard against accidental over-aggregation).
      - notExists:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-view"]
      - equal:
          path: rules[0].apiGroups
          value: [projection.sh]
      - equal:
          path: rules[0].resources
          value: [projections]
      - equal:
          path: rules[0].verbs
          value: [get, list, watch, create, update, patch, delete]
      - equal:
          path: rules[1].apiGroups
          value: [projection.sh]
      - equal:
          path: rules[1].resources
          value: [projections/status]
      - equal:
          path: rules[1].verbs
          value: [get]
      # Edit MUST NOT include clusterprojections — that's the whole point
      # of splitting namespaced-edit and cluster-admin.
      - notContains:
          path: rules
          any: true
          content:
            resources: [clusterprojections]

  - it: renders the namespaced-view ClusterRole with only the view aggregation label
    template: clusterrole-namespaced-view.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-projection-namespaced-view
      - equal:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-view"]
          value: "true"
      # Negative assertions: view must NOT aggregate into admin or edit.
      - notExists:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-admin"]
      - notExists:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-edit"]
      # Read-only verbs only — no create/update/patch/delete.
      - equal:
          path: rules[0].apiGroups
          value: [projection.sh]
      - equal:
          path: rules[0].resources
          value: [projections, projections/status]
      - equal:
          path: rules[0].verbs
          value: [get, list, watch]
      - notContains:
          path: rules[0].verbs
          content: create
      - notContains:
          path: rules[0].verbs
          content: update
      - notContains:
          path: rules[0].verbs
          content: patch
      - notContains:
          path: rules[0].verbs
          content: delete

  - it: renders the cluster-admin ClusterRole with NO aggregation labels
    template: clusterrole-cluster-admin.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-projection-cluster-admin
      # Critical negative assertions: this role MUST NOT aggregate to any
      # default role. ClusterProjection is cluster-tier and adding any
      # aggregate-to-* label would silently widen edit/admin/view holders
      # into the cluster scope.
      - notExists:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-admin"]
      - notExists:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-edit"]
      - notExists:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-view"]
      - equal:
          path: rules[0].apiGroups
          value: [projection.sh]
      - equal:
          path: rules[0].resources
          value: [clusterprojections]
      - equal:
          path: rules[0].verbs
          value: [get, list, watch, create, update, patch, delete]
      - equal:
          path: rules[1].apiGroups
          value: [projection.sh]
      - equal:
          path: rules[1].resources
          value: [clusterprojections/status]
      - equal:
          path: rules[1].verbs
          value: [get]
      # Cluster-admin MUST NOT include the namespaced projections resource.
      - notContains:
          path: rules
          any: true
          content:
            resources: [projections]

  - it: suppresses namespaced-edit when rbac.aggregate=false
    template: clusterrole-namespaced-edit.yaml
    set:
      rbac.aggregate: false
    asserts:
      - hasDocuments:
          count: 0

  - it: suppresses namespaced-view when rbac.aggregate=false
    template: clusterrole-namespaced-view.yaml
    set:
      rbac.aggregate: false
    asserts:
      - hasDocuments:
          count: 0

  - it: suppresses cluster-admin when rbac.aggregate=false
    template: clusterrole-cluster-admin.yaml
    set:
      rbac.aggregate: false
    asserts:
      - hasDocuments:
          count: 0

  # Regression guard: the manager ClusterRole — managed by the controller
  # team, untouched by this PR — must still grant CRUD on clusterprojections
  # so the controller can reconcile them. If a future refactor breaks this,
  # this assertion fails before the controller starts NotFound-looping.
  - it: keeps clusterprojections CRUD on the manager ClusterRole
    template: clusterrole.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [projection.sh]
            resources: [clusterprojections, projections]
            verbs: [create, delete, get, list, patch, update, watch]
