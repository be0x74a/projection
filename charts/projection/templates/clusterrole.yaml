apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "projection.fullname" . }}-manager
  labels:
    {{- include "projection.labels" . | nindent 4 }}
rules:
  {{- /*
      User-configured supportedKinds rules. Empty list produces no entries
      here; the operator can still reconcile Projection CRs (rules below)
      but cannot read or write any other Kind. See docs/security.md.
  */}}
  {{- range .Values.supportedKinds }}
  {{- if not (hasKey . "apiGroup") }}{{ fail "supportedKinds entries require an apiGroup (use \"\" for the core group)" }}{{- end }}
  {{- if not (hasKey . "resources") }}{{ fail "supportedKinds entries require a resources list" }}{{- end }}
  - apiGroups:
      - {{ .apiGroup | quote }}
    resources:
    {{- range .resources }}
      - {{ . | quote }}
    {{- end }}
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  {{- end }}
  - apiGroups:
      - projection.sh
    resources:
      - clusterprojections
      - projections
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - projection.sh
    resources:
      - clusterprojections/finalizers
      - projections/finalizers
    verbs:
      - update
  - apiGroups:
      - projection.sh
    resources:
      - clusterprojections/status
      - projections/status
    verbs:
      - get
      - patch
      - update
  {{- /*
      Namespace read access is required by the cluster-scoped reconciler
      to evaluate destination namespaceSelectors and to enqueue affected
      ClusterProjections on namespace add/update/delete events. The
      namespaced reconciler doesn't read namespaces.
  */}}
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
