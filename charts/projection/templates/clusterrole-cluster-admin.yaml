{{- if .Values.rbac.aggregate -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "projection.fullname" . }}-cluster-admin
  labels:
    {{- include "projection.labels" . | nindent 4 }}
  # NOTE: deliberately NOT aggregated to any default role. ClusterProjection
  # is cluster-scoped and can mirror any object across any namespace, so
  # access to it must be granted explicitly by a cluster admin via a
  # ClusterRoleBinding (or RoleBinding for read-only on a single namespace
  # of subjects). Adding rbac.authorization.k8s.io/aggregate-to-* here
  # would silently widen anyone with edit/admin into the cluster tier.
rules:
  - apiGroups:
      - projection.sh
    resources:
      - clusterprojections
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - projection.sh
    resources:
      - clusterprojections/status
    verbs:
      - get
{{- end }}
