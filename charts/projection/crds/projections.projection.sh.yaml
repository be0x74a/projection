---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: projections.projection.sh
spec:
  group: projection.sh
  names:
    kind: Projection
    listKind: ProjectionList
    plural: projections
    shortNames:
    - proj
    singular: projection
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.source.kind
      name: Kind
      type: string
    - jsonPath: .spec.source.group
      name: Source-Group
      priority: 1
      type: string
    - jsonPath: .spec.source.namespace
      name: Source-Namespace
      type: string
    - jsonPath: .spec.source.name
      name: Source-Name
      type: string
    - jsonPath: .status.destinationName
      name: Destination
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Projection mirrors one source object into the Projection's own
          namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ProjectionSpec is the desired state of a namespaced Projection.

              A Projection mirrors one source object into the Projection's own namespace.
              It cannot write outside its own namespace — that is what ClusterProjection
              is for. This narrowness is deliberate: it makes namespace-scoped RBAC on
              `projections.projection.sh` a structural confinement, not a policy hint.
            properties:
              destination:
                description: |-
                  Destination optionally renames the destination. The destination
                  namespace is implicitly the Projection's own namespace and cannot
                  be set; for cross-namespace mirroring use ClusterProjection.
                properties:
                  name:
                    description: |-
                      Name in the destination namespace (DNS-1123 subdomain). Defaults to
                      Source.Name when empty.
                    maxLength: 253
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                type: object
              overlay:
                description: Overlay applies metadata patches on top of the projected
                  object.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      Annotations are merged onto the destination's metadata.annotations.
                      Same overlay-wins merge rule as Labels.
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels are merged onto the destination's metadata.labels. Overlay
                      entries win on key conflicts with the source (overlay-last semantics);
                      source-only and overlay-only keys are kept as-is.
                    type: object
                type: object
              source:
                description: Source identifies the object to project.
                properties:
                  group:
                    description: |-
                      Group is the API group of the source object. Empty string means the
                      core group (e.g. ConfigMap, Secret, Service).
                    pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  kind:
                    description: Kind is the API Kind of the source object (PascalCase).
                    pattern: ^[A-Z][a-zA-Z0-9]*$
                    type: string
                  name:
                    description: Name of the source object (DNS-1123 subdomain).
                    maxLength: 253
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  namespace:
                    description: Namespace where the source object lives.
                    maxLength: 63
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  version:
                    description: |-
                      Version is the API version of the source object within its Group. Omit
                      to use the RESTMapper's preferred served version (the source
                      automatically follows version promotions). When set, must match
                      Kubernetes' canonical version-string shape (`vN`, `vNalphaM`,
                      `vNbetaM`).
                    pattern: ^$|^v[0-9]+((alpha|beta)[0-9]+)?$
                    type: string
                required:
                - kind
                - name
                - namespace
                type: object
            required:
            - source
            type: object
          status:
            description: ProjectionStatus reports the most recent reconcile outcome.
            properties:
              conditions:
                description: 'Conditions: SourceResolved, DestinationWritten, Ready.'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              destinationName:
                description: |-
                  DestinationName is the resolved name of the destination object after
                  applying any rename override (`spec.destination.name`) or defaulting to
                  `spec.source.name`. Populated by the controller after a successful
                  write; empty before the first reconcile completes.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
