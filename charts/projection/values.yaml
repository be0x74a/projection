# Default values for the projection chart.
# This is a YAML-formatted file. Values may be overridden with --set or --values.

# -- Container image for the controller-manager.
image:
  # -- Image repository. Override for a private registry or custom build.
  repository: ghcr.io/projection-operator/projection
  # -- Image tag. Empty string falls back to the chart's appVersion.
  tag: ""
  # -- Image pull policy. Defaults to IfNotPresent for tagged images.
  pullPolicy: IfNotPresent

# -- List of image pull secrets referenced by the controller pod.
# Example: [{ name: ghcr-cred }]
imagePullSecrets: []

# -- Override the chart name portion of generated resource names.
nameOverride: ""

# -- Override the fully-qualified name (release-name-chart-name) used for all
# generated resources. Leave empty to use the default template.
fullnameOverride: ""

# -- Number of controller replicas. Values >1 require leaderElection.enabled=true
# so only one replica reconciles at a time.
replicaCount: 1

# -- Requeue cadence for Projection reconciliation. Controls how often the
# controller retries after a successful or failed reconcile. Longer values
# reduce API server load in clusters with many flapping projections; shorter
# values speed up developer feedback. Plumbed as --requeue-interval.
requeueInterval: 30s

# -- Maximum in-flight destination writes per selector-based ClusterProjection
# during fan-out. Has no effect on namespaced Projection (single-target only).
# Each worker issues a Get plus optionally a Create or Update against the
# apiserver; HTTP/2 multiplexing in client-go shares a single connection
# across the workers, so this caps parallelism rather than connections. The
# default of 16 fits comfortably within typical kube-apiserver APF priority-
# level budgets at production scale; raise it for ClusterProjections matching
# thousands of namespaces, lower it on apiserver-constrained clusters. Must
# be > 0. Plumbed as --selector-write-concurrency.
selectorWriteConcurrency: 16

# -- Leader election settings. The leader lease is stored in the release namespace.
leaderElection:
  # -- Enable Kubernetes leader election. Required when replicaCount > 1.
  enabled: true
  # -- Duration the leader holds the lease before standbys may take over.
  # Only effective when enabled=true. Must remain strictly greater than
  # controller-runtime's 10s renew-deadline default. Plumbed as
  # --leader-election-lease-duration.
  leaseDuration: 15s

# -- Metrics endpoint settings. The controller serves Prometheus metrics on
# :8443 secured by the kube-rbac-authn/authz filter by default.
metrics:
  # -- Enable the metrics HTTP(S) endpoint and associated Service.
  enabled: true
  # -- Serve metrics over HTTPS with authn/authz filter. Set to false to serve
  # plaintext HTTP (not recommended).
  secure: true
  # -- Address the metrics endpoint binds to. Format: host:port.
  bindAddress: ":8443"
  # -- Metrics Service configuration. Created only when metrics.enabled is true.
  service:
    # -- Service type. Use ClusterIP for in-cluster scrape (recommended).
    type: ClusterIP
    # -- Service port exposing the metrics endpoint.
    port: 8443

# -- Health probe endpoint settings. Exposes /healthz and /readyz.
healthProbe:
  # -- Address the health probe endpoint binds to. Format: host:port.
  bindAddress: ":8081"

# -- Source projectability policy. Controls which source objects the
# controller is willing to mirror. See docs/concepts.md for a deeper
# discussion of the trade-offs.
#
#   "allowlist" (default, secure-by-default): every source object must
#     carry the annotation projection.sh/projectable="true". Matches
#     the pattern used by emberstack/Reflector.
#   "permissive": any source is projectable unless explicitly opted out.
#     Closer to the v0.1.0-alpha.1 behavior and appropriate for clusters
#     where Projection CR creation is already tightly locked down.
#
# Regardless of mode, an annotation value of "false" is always honored
# as a source-owner veto — the source owner's escape hatch.
sourceMode: allowlist

# -- Kinds this operator instance is permitted to project, expressed as RBAC
# rule fragments. The chart injects each entry into the operator's
# ClusterRole with the full verb set (get, list, watch, create, update,
# patch, delete). See docs/security.md for the full story.
#
# The default below grants cluster-admin-equivalent access (`*/*`),
# preserving pre-v0.2 behavior. Regulated clusters (finance, healthcare,
# government) SHOULD replace this with an explicit allowlist before
# deploying. An empty list (`supportedKinds: []`) grants NOTHING beyond
# the operator's own Projection CRs — the controller can reconcile
# its own state but cannot read or write any other Kind.
#
# Wildcards (`*`) are allowed in both apiGroup and resources. Note the
# subtle but important distinction:
#   - apiGroup: ""   => core API group only (ConfigMap, Secret, Pod, ...)
#   - apiGroup: "*"  => any API group, including core
# The resource name is the lowercase plural shown by `kubectl api-resources`
# (e.g. `configmaps`, `secrets`, `ingresses`).
#
# Example — strict, read+write for two core-group Kinds:
# supportedKinds:
#   - apiGroup: ""
#     resources: [configmaps, secrets]
#
# Example — moderate, any resource in a trusted group:
# supportedKinds:
#   - apiGroup: projection.sh
#     resources: ["*"]
#
# Example — disable entirely (operator becomes inert for external Kinds):
# supportedKinds: []
supportedKinds:
  - apiGroup: "*"
    resources: ["*"]

# -- Resource requests and limits for the controller container.
# Sensible defaults for a single-tenant operator; tune for your workload.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Node selector applied to the controller pod.
nodeSelector: {}

# -- Tolerations applied to the controller pod.
tolerations: []

# -- Affinity rules for the controller pod.
affinity: {}

# -- Topology spread constraints for the controller pod.
topologySpreadConstraints: []

# -- Security contexts applied to the controller pod and container. Defaults
# follow the Kubernetes "restricted" Pod Security Standard.
securityContext:
  # -- Pod-level securityContext.
  pod:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  # -- Container-level securityContext.
  container:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# -- ServiceAccount configuration for the controller.
serviceAccount:
  # -- If true, a ServiceAccount is created for the controller.
  create: true
  # -- Name of the ServiceAccount to use. If empty and create is true, a name is
  # generated from the release fullname.
  name: ""
  # -- Annotations to add to the ServiceAccount (e.g. IRSA/Workload Identity).
  annotations: {}

# -- End-user-facing RBAC. The controller's own ClusterRole and the
# `<release>-cluster-admin` ClusterRole are always rendered; this section
# only controls the aggregated user-tier roles that let namespace tenants
# self-serve Projection access via the standard admin/edit/view roles.
rbac:
  # -- When true (default), ship the `<release>-namespaced-edit` and
  # `<release>-namespaced-view` ClusterRoles carrying aggregation labels
  # so the standard admin/edit roles in each namespace gain Projection
  # CRUD and the standard view role gains read access — automatically,
  # for every namespace tenant. Set to false to suppress those two
  # aggregated roles. The `<release>-cluster-admin` ClusterRole (for
  # ClusterProjection access) is unaffected by this flag and must be
  # bound explicitly via ClusterRoleBinding regardless.
  aggregate: true

# -- CRD installation settings. Helm 3 only installs files under crds/ on the
# FIRST install; subsequent upgrades do NOT reconcile CRDs and `helm uninstall`
# does NOT delete them. Manage CRD lifecycle manually outside of Helm for
# multi-release or upgrade scenarios.
crds:
  # -- Whether to let Helm install the bundled CRD on first install. Has no
  # effect on upgrade or uninstall; this flag is purely for documentation
  # consistency (Helm itself always reads crds/ on first install).
  install: true

# -- ServiceMonitor for prometheus-operator integration. Opt-in; requires the
# monitoring.coreos.com/v1 CRD installed in the cluster.
serviceMonitor:
  # -- If true, render a ServiceMonitor selecting the metrics Service.
  enabled: false
  # -- Scrape interval.
  interval: 30s
  # -- Scrape timeout.
  scrapeTimeout: 10s
  # -- Extra labels added to the ServiceMonitor (for prometheus-operator's
  # serviceMonitorSelector matching).
  labels: {}
  # -- TLS configuration for scraping the HTTPS metrics endpoint. The default
  # controller-runtime cert is self-signed, so insecureSkipVerify is enabled
  # by default. Override to point at a CA bundle if you pin a custom cert.
  tlsConfig:
    insecureSkipVerify: true

# -- NetworkPolicy restricting controller egress to the Kubernetes API server
# and cluster DNS. Opt-in because egress lockdown can surprise dev clusters.
networkPolicy:
  # -- If true, render a NetworkPolicy for the controller pod.
  enabled: false
  # -- Cluster DNS selector (defaults to standard kube-dns in kube-system).
  dns:
    namespace: kube-system
    podLabels:
      k8s-app: kube-dns
    port: 53
  # -- Additional egress rules (each entry is a NetworkPolicyEgressRule).
  # Use this to allow the controller to reach private registries, external
  # webhooks, etc.
  extraEgress: []

# -- PodDisruptionBudget to keep the controller available through voluntary
# disruptions. Opt-in. With replicaCount=1, minAvailable=1 blocks drains —
# either raise replicaCount or switch to maxUnavailable: 1.
podDisruptionBudget:
  # -- If true, render a PodDisruptionBudget for the controller Deployment.
  enabled: false
  # -- Minimum number of pods that must remain available.
  minAvailable: 1
  # -- Maximum number of pods allowed to be unavailable. Set exactly one of
  # minAvailable / maxUnavailable; leave the other as null.
  maxUnavailable: null
