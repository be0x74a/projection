apiVersion: v1
kind: Namespace
metadata:
  name: staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: staging
  annotations:
    projection.be0x74a.io/projectable: "true"
data:
  version: v1
  feature_flag: enabled
---
apiVersion: projection.be0x74a.io/v1
kind: Projection
metadata:
  name: app-config-mirror
  namespace: staging
spec:
  source:
    apiVersion: v1
    kind: ConfigMap
    namespace: staging
    name: app-config
  destination:
    namespace: production
