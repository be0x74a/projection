---
# --- Act 1: namespace-tier mirroring (Projection) ---
# Source lives in staging; destination IS the Projection's own namespace
# (production), so the Projection itself is created in production.
apiVersion: v1
kind: Namespace
metadata:
  name: staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: staging
  annotations:
    projection.sh/projectable: "true"
data:
  version: v1
  feature_flag: enabled
---
apiVersion: projection.sh/v1
kind: Projection
metadata:
  name: app-config-mirror
  namespace: production
spec:
  source:
    group: ""
    version: v1
    kind: ConfigMap
    namespace: staging
    name: app-config
---
# --- Act 2: cluster-tier fan-out (ClusterProjection, explicit-list) ---
# One source ConfigMap fans out into three tenant namespaces. ClusterProjection
# is cluster-scoped (no metadata.namespace).
apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-b
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-c
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ca-bundle
  namespace: platform
  annotations:
    projection.sh/projectable: "true"
data:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    (truncated for demo)
    -----END CERTIFICATE-----
---
apiVersion: projection.sh/v1
kind: ClusterProjection
metadata:
  name: ca-bundle-fanout
spec:
  source:
    group: ""
    version: v1
    kind: ConfigMap
    namespace: platform
    name: ca-bundle
  destination:
    namespaces:
      - tenant-a
      - tenant-b
      - tenant-c
