name: Helm Release

on:
  push:
    tags:
      - 'v*'

# Top-level read-only; packages: write is granted only to the job that
# actually pushes the chart (principle of least privilege).
permissions:
  contents: read

jobs:
  release-chart:
    name: Package and push Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for chart
        id: check
        run: |
          if [ -d charts/projection ] && [ -f charts/projection/Chart.yaml ]; then
            echo "has_chart=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_chart=false" >> "$GITHUB_OUTPUT"
            echo "::notice::charts/projection not present; skipping Helm chart release."
          fi

      - name: Install Helm
        if: steps.check.outputs.has_chart == 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.has_chart == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package chart
        if: steps.check.outputs.has_chart == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package charts/projection \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist-chart

      - name: Push chart to OCI registry
        if: steps.check.outputs.has_chart == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm push "dist-chart/projection-${VERSION}.tgz" oci://ghcr.io/be0x74a/charts
