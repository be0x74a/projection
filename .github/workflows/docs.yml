name: Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    outputs:
      has_mkdocs: ${{ steps.check.outputs.has_mkdocs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for mkdocs.yml
        id: check
        run: |
          if [ -f mkdocs.yml ]; then
            echo "has_mkdocs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_mkdocs=false" >> "$GITHUB_OUTPUT"
            echo "::notice::mkdocs.yml not present; skipping docs build."
          fi

      - name: Setup Python
        if: steps.check.outputs.has_mkdocs == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install mkdocs-material
        if: steps.check.outputs.has_mkdocs == 'true'
        run: pip install mkdocs-material

      - name: Build site
        if: steps.check.outputs.has_mkdocs == 'true'
        run: mkdocs build --strict --site-dir _site

      - name: Configure Pages
        if: steps.check.outputs.has_mkdocs == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.check.outputs.has_mkdocs == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: needs.build.outputs.has_mkdocs == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
