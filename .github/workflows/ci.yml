name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Top-level read-only; every job has zero write access by default.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Run lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x]
        k8s: [1.32.0, 1.33.0, 1.34.1, 1.35.0]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Run tests
        run: make test ENVTEST_K8S_VERSION=${{ matrix.k8s }}
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.go-version }}-${{ matrix.k8s }}
          path: cover.out
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Build
        run: make build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        install:
          - kustomize
          - helm
        include:
          - install: kustomize
            deployment_name: projection-controller-manager
          - install: helm
            deployment_name: projection
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: projection-e2e
          node_image: kindest/node:v1.32.0
      - name: Build image
        run: make docker-build IMG=projection:dev
      - name: Load image into Kind
        run: kind load docker-image projection:dev --name projection-e2e
      - name: Install CRDs (Kustomize)
        if: matrix.install == 'kustomize'
        run: make install
      - name: Deploy operator (Kustomize)
        if: matrix.install == 'kustomize'
        run: make deploy IMG=projection:dev
      - name: Install Helm
        if: matrix.install == 'helm'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Install operator (Helm)
        if: matrix.install == 'helm'
        run: |
          helm install projection charts/projection \
            --namespace projection-system --create-namespace \
            --set image.repository=projection \
            --set image.tag=dev \
            --set image.pullPolicy=Never
      - name: Wait for operator Deployment to be Ready
        run: |
          kubectl -n projection-system rollout status deploy/${{ matrix.deployment_name }} --timeout=180s
      - name: Run e2e tests
        run: make test-e2e
      - name: Collect operator logs
        if: failure()
        run: |
          mkdir -p e2e-logs
          kubectl -n projection-system get pods -o wide > e2e-logs/pods.txt || true
          kubectl -n projection-system describe pods > e2e-logs/describe.txt || true
          kubectl -n projection-system logs deploy/${{ matrix.deployment_name }} --all-containers=true --tail=-1 > e2e-logs/controller.log || true
      - name: Upload operator logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-logs-${{ matrix.install }}
          path: e2e-logs
          if-no-files-found: ignore

  e2e-upgrade:
    name: E2E Upgrade v0.1 -> v0.2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: projection-e2e-upgrade
          node_image: kindest/node:v1.32.0
      - name: Build image
        run: make docker-build IMG=projection:dev
      - name: Load image into Kind
        run: kind load docker-image projection:dev --name projection-e2e-upgrade
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run upgrade e2e
        run: make test-e2e-upgrade
      - name: Collect operator logs on failure
        if: failure()
        run: |
          mkdir -p e2e-upgrade-logs
          kubectl -n projection-system get pods -o wide > e2e-upgrade-logs/pods.txt 2>&1 || true
          kubectl -n projection-system describe pods > e2e-upgrade-logs/describe.txt 2>&1 || true
          kubectl -n projection-system logs -l control-plane=controller-manager --all-containers --tail=-1 > e2e-upgrade-logs/controller.log 2>&1 || true
          kubectl get projections -A -o yaml > e2e-upgrade-logs/projections.yaml 2>&1 || true
      - name: Upload operator logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-upgrade-logs
          path: e2e-upgrade-logs

  chart-test:
    name: Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false --version v1.0.3 https://github.com/helm-unittest/helm-unittest
      - name: Lint chart
        run: helm lint charts/projection
      - name: Run chart tests
        run: helm unittest charts/projection

  docs-ref:
    name: CRD reference drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Regenerate API reference
        run: make docs-ref
      - name: Fail on drift
        run: |
          if ! git diff --exit-code docs/api-reference.md; then
            echo "::error::docs/api-reference.md is out of sync with api/v1/ types."
            echo "::error::Run 'make docs-ref' locally and commit the result."
            exit 1
          fi
