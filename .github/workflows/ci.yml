name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Top-level read-only; every job has zero write access by default.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Run lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Run tests
        run: make test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.go-version }}
          path: cover.out
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Build
        run: make build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        install:
          - kustomize
          - helm
        include:
          - install: kustomize
            deployment_name: projection-controller-manager
          - install: helm
            deployment_name: projection
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: 1.25.x
          cache: true
      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: projection-e2e
          node_image: kindest/node:v1.31.0
      - name: Build image
        run: make docker-build IMG=projection:dev
      - name: Load image into Kind
        run: kind load docker-image projection:dev --name projection-e2e
      - name: Install CRDs (Kustomize)
        if: matrix.install == 'kustomize'
        run: make install
      - name: Deploy operator (Kustomize)
        if: matrix.install == 'kustomize'
        run: make deploy IMG=projection:dev
      - name: Install Helm
        if: matrix.install == 'helm'
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - name: Install operator (Helm)
        if: matrix.install == 'helm'
        run: |
          helm install projection charts/projection \
            --namespace projection-system --create-namespace \
            --set image.repository=projection \
            --set image.tag=dev \
            --set image.pullPolicy=Never
      - name: Wait for operator Deployment to be Ready
        run: |
          kubectl -n projection-system rollout status deploy/${{ matrix.deployment_name }} --timeout=180s
      - name: Run e2e tests
        run: make test-e2e
      - name: Collect operator logs
        if: failure()
        run: |
          mkdir -p e2e-logs
          kubectl -n projection-system get pods -o wide > e2e-logs/pods.txt || true
          kubectl -n projection-system describe pods > e2e-logs/describe.txt || true
          kubectl -n projection-system logs deploy/${{ matrix.deployment_name }} --all-containers=true --tail=-1 > e2e-logs/controller.log || true
      - name: Upload operator logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-logs-${{ matrix.install }}
          path: e2e-logs
          if-no-files-found: ignore

  chart-test:
    name: Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false --version v1.0.3 https://github.com/helm-unittest/helm-unittest
      - name: Lint chart
        run: helm lint charts/projection
      - name: Run chart tests
        run: helm unittest charts/projection
