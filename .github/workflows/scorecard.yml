name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Sundays at 07:00 UTC
    - cron: '0 7 * * 0'
  push:
    branches:
      - main

permissions: read-all

# The scorecard job must contain ONLY steps with `uses:` — no `run:` steps —
# because `publish_results: true` uploads signed results to the public
# securityscorecards.dev webapp, and the webapp rejects runs that have any
# bespoke shell steps (see ossf/scorecard-action#workflow-restrictions).
# If you ever take this repo private again, remove `publish_results: true`
# instead of adding a visibility-check `run:` step — the latter breaks publishing.
jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: results.sarif
