<?xml version="1.0" encoding="UTF-8"?>
<!--
  projection logo — placeholder.
  A triangular prism with a beam entering and three colored rays leaving,
  evoking the operator's behavior: one source projected into multiple forms.
  Replace with a designed asset before v1.0.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="projection logo">
  <title>projection</title>
  <!-- incoming beam -->
  <line x1="10" y1="100" x2="80" y2="100" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <!-- prism -->
  <polygon points="80,40 80,160 180,100" fill="#1f6feb" stroke="#0b3d91" stroke-width="3" stroke-linejoin="round" />
  <!-- dispersed rays -->
  <line x1="180" y1="100" x2="200" y2="60"  stroke="#ff6b6b" stroke-width="4" stroke-linecap="round" />
  <line x1="180" y1="100" x2="200" y2="100" stroke="#ffd93d" stroke-width="4" stroke-linecap="round" />
  <line x1="180" y1="100" x2="200" y2="140" stroke="#6bcf7f" stroke-width="4" stroke-linecap="round" />
</svg>
