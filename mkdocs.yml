site_name: projection
site_description: The Kubernetes CRD for declarative resource mirroring.
site_url: https://projection.sh/
repo_url: https://github.com/projection-operator/projection
repo_name: projection-operator/projection
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/brightness-4, name: Switch to light mode }

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed: { alternate_style: true }
  - tables
  - toc: { permalink: true }

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Upgrade from v0.1: upgrade.md
  - Concepts: concepts.md
  - CRD behavior: crd-reference.md
  - API reference: api-reference.md
  - API stability: api-stability.md
  - Use cases: use-cases.md
  - vs alternatives: comparison.md
  - Observability: observability.md
  - Troubleshooting: troubleshooting.md
  - Scale: scale.md
  - Security: security.md
  - Limitations & roadmap: limitations.md

plugins:
  - search
