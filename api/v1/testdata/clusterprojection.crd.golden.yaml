---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clusterprojections.projection.sh
spec:
  group: projection.sh
  names:
    kind: ClusterProjection
    listKind: ClusterProjectionList
    plural: clusterprojections
    shortNames:
    - cproj
    singular: clusterprojection
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.source.kind
      name: Kind
      type: string
    - jsonPath: .spec.source.group
      name: Source-Group
      priority: 1
      type: string
    - jsonPath: .spec.source.namespace
      name: Source-Namespace
      type: string
    - jsonPath: .spec.source.name
      name: Source-Name
      type: string
    - jsonPath: .status.destinationName
      name: Destination-Name
      type: string
    - jsonPath: .status.namespacesWritten
      name: Targets
      type: integer
    - jsonPath: .status.namespacesFailed
      name: Failed
      priority: 1
      type: integer
    - jsonPath: .spec.destination.namespaceSelector.matchLabels
      name: Selector
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: ClusterProjection mirrors one source object into many destination
          namespaces.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ClusterProjectionSpec is the desired state of a cluster-scoped Projection.

              A ClusterProjection fans out one source object into many namespaces
              selected by either an explicit list or a label selector. Cluster-tier
              authority is required to create one — the chart does NOT aggregate the
              `clusterprojections` CRUD verbs into the built-in `admin`/`edit` roles.
            properties:
              destination:
                description: Destination configures the fan-out target set and optional
                  rename.
                properties:
                  name:
                    description: |-
                      Name in each destination namespace (DNS-1123 subdomain). Defaults to
                      Source.Name when empty. The same Name is written into every targeted
                      namespace.
                    maxLength: 253
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  namespaceSelector:
                    description: |-
                      NamespaceSelector picks destination namespaces by label. Mutually
                      exclusive with Namespaces.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  namespaces:
                    description: |-
                      Namespaces is an explicit list of destination namespaces. Mutually
                      exclusive with NamespaceSelector. Each entry is a DNS-1123 label;
                      at least one entry is required when this field is set.
                    items:
                      type: string
                    minItems: 1
                    type: array
                    x-kubernetes-list-type: set
                type: object
                x-kubernetes-validations:
                - message: namespaces and namespaceSelector are mutually exclusive
                  rule: '!(has(self.namespaces) && has(self.namespaceSelector))'
                - message: one of namespaces or namespaceSelector must be set
                  rule: has(self.namespaces) || has(self.namespaceSelector)
              overlay:
                description: |-
                  Overlay applies metadata patches uniformly to every projected copy.
                  (Per-target overlays are not supported in v0.3.)
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      Annotations are merged onto the destination's metadata.annotations.
                      Same overlay-wins merge rule as Labels.
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels are merged onto the destination's metadata.labels. Overlay
                      entries win on key conflicts with the source (overlay-last semantics);
                      source-only and overlay-only keys are kept as-is.
                    type: object
                type: object
              source:
                description: Source identifies the object to project.
                properties:
                  group:
                    description: |-
                      Group is the API group of the source object. Empty string means the
                      core group (e.g. ConfigMap, Secret, Service).
                    pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  kind:
                    description: Kind is the API Kind of the source object (PascalCase).
                    pattern: ^[A-Z][a-zA-Z0-9]*$
                    type: string
                  name:
                    description: Name of the source object (DNS-1123 subdomain).
                    maxLength: 253
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  namespace:
                    description: Namespace where the source object lives.
                    maxLength: 63
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  version:
                    description: |-
                      Version is the API version of the source object within its Group. Omit
                      to use the RESTMapper's preferred served version (the source
                      automatically follows version promotions). When set, must match
                      Kubernetes' canonical version-string shape (`vN`, `vNalphaM`,
                      `vNbetaM`).
                    pattern: ^$|^v[0-9]+((alpha|beta)[0-9]+)?$
                    type: string
                required:
                - kind
                - name
                - namespace
                type: object
            required:
            - destination
            - source
            type: object
          status:
            description: ClusterProjectionStatus reports the rollup of the most recent
              reconcile.
            properties:
              conditions:
                description: 'Conditions: SourceResolved, DestinationWritten, Ready.'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              destinationName:
                description: |-
                  DestinationName is the resolved name of the destination object,
                  identical across all targeted namespaces. Populated after the first
                  successful write; empty before that.
                type: string
              namespacesFailed:
                description: |-
                  NamespacesFailed is the count of namespaces where the write failed
                  during the most recent reconcile. The DestinationWritten condition's
                  message carries a (truncated) list of failed namespace names.
                format: int32
                type: integer
              namespacesWritten:
                description: |-
                  NamespacesWritten is the count of namespaces in which the destination
                  was successfully created or updated during the most recent reconcile.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
