# Fan out one ConfigMap into every namespace labeled for mirroring.
#
# This uses a cluster-scoped ClusterProjection — the right resource for
# "one source, many destinations". Creating a ClusterProjection requires
# cluster-admin authority; the chart does NOT aggregate the
# `clusterprojections` CRUD verbs into the built-in `admin`/`edit` roles.
#
# After applying this file:
#   kubectl get clusterprojections
#   kubectl get configmap -A -l projected-by=projection
#
# Label a new namespace with projection.sh/mirror=true and the
# destination appears there too; remove the label and it's cleaned up.
# One ClusterProjection covers every matching namespace, with a
# DestinationWritten rollup condition and per-namespace Events.
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
  labels:
    projection.sh/mirror: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-b
  labels:
    projection.sh/mirror: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-c
  labels:
    projection.sh/mirror: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  annotations:
    # Source owner opts this ConfigMap in to projection. Required under the
    # default allowlist source-mode; harmless in permissive mode. Setting
    # this to "false" is always honored as an opt-out veto.
    projection.sh/projectable: "true"
data:
  log_level: info
  feature_flag: enabled
---
apiVersion: projection.sh/v1
kind: ClusterProjection
metadata:
  name: app-config-fanout
spec:
  source:
    kind: ConfigMap
    name: app-config
    namespace: default
  destination:
    namespaceSelector:
      matchLabels:
        projection.sh/mirror: "true"
    # name omitted → defaults to source.name ("app-config") in every
    # matching namespace.
  overlay:
    labels:
      projected-by: projection
