# Mirror one source into multiple destinations with per-namespace overlays.
#
# When destinations need DIFFERENT overlays per namespace, co-locate one
# Projection per namespace — each Projection lives in its destination
# namespace and carries its own overlay (here: a different `tenant:` label
# in each tenant). ClusterProjection is for the same overlay across many
# namespaces; this pattern is for differentiated overlays.
#
# You also get per-destination status independently: a DestinationConflict
# in tenant-c won't mark the others as failed. The cost is more YAML — and
# requiring write authority in each destination namespace.
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-b
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-c
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: org-policy
  namespace: platform
  annotations:
    # Opt-in required by the default allowlist source-mode.
    projection.sh/projectable: "true"
data:
  retention_days: "30"
  region: eu-west-1
---
apiVersion: projection.sh/v1
kind: Projection
metadata:
  name: org-policy
  namespace: tenant-a
spec:
  source:
    group: ""
    version: v1
    kind: ConfigMap
    name: org-policy
    namespace: platform
  overlay:
    labels: {tenant: tenant-a}
---
apiVersion: projection.sh/v1
kind: Projection
metadata:
  name: org-policy
  namespace: tenant-b
spec:
  source:
    group: ""
    version: v1
    kind: ConfigMap
    name: org-policy
    namespace: platform
  overlay:
    labels: {tenant: tenant-b}
---
apiVersion: projection.sh/v1
kind: Projection
metadata:
  name: org-policy
  namespace: tenant-c
spec:
  source:
    group: ""
    version: v1
    kind: ConfigMap
    name: org-policy
    namespace: platform
  overlay:
    labels: {tenant: tenant-c}
