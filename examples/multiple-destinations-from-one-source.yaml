# Mirror one source into multiple destinations, one Projection per target.
#
# This pattern is preferred when each destination needs a *distinct overlay*
# (here: a different `tenant:` label). For uniform fan-out (same overlay
# everywhere) use `destination.namespaceSelector` — see
# `configmap-fan-out-selector.yaml` — which covers all matching namespaces
# with a single Projection and a rollup status.
#
# With one Projection per destination you still get per-destination status
# independently (one DestinationConflict in tenant-c won't mark the others
# as failed), at the cost of more YAML.
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-b
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-c
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: org-policy
  namespace: platform
  annotations:
    # Opt-in required by the default allowlist source-mode.
    projection.be0x74a.io/projectable: "true"
data:
  retention_days: "30"
  region: eu-west-1
---
apiVersion: projection.be0x74a.io/v1
kind: Projection
metadata:
  name: org-policy-tenant-a
  namespace: platform
spec:
  source:
    apiVersion: v1
    kind: ConfigMap
    name: org-policy
    namespace: platform
  destination:
    namespace: tenant-a
  overlay:
    labels: {tenant: tenant-a}
---
apiVersion: projection.be0x74a.io/v1
kind: Projection
metadata:
  name: org-policy-tenant-b
  namespace: platform
spec:
  source:
    apiVersion: v1
    kind: ConfigMap
    name: org-policy
    namespace: platform
  destination:
    namespace: tenant-b
  overlay:
    labels: {tenant: tenant-b}
---
apiVersion: projection.be0x74a.io/v1
kind: Projection
metadata:
  name: org-policy-tenant-c
  namespace: platform
spec:
  source:
    apiVersion: v1
    kind: ConfigMap
    name: org-policy
    namespace: platform
  destination:
    namespace: tenant-c
  overlay:
    labels: {tenant: tenant-c}
