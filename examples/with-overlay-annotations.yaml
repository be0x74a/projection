# Apply overlay annotations.
#
# Same merge semantics as labels: overlay entries win on key conflict
# (overlay-last). Useful for tagging the destination with provenance
# metadata your observability stack can pick up.
#
# Note: regardless of overlay, projection always stamps:
#   annotations:
#     projection.sh/owned-by: <projection-namespace>/<projection-name>
# This is what the conflict-detection check uses on subsequent reconciles.
---
apiVersion: v1
kind: Namespace
metadata:
  name: app-staging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: feature-flags
  namespace: platform
  annotations:
    # Opt-in required by the default allowlist source-mode.
    projection.sh/projectable: "true"
data:
  experimental_search: "true"
---
apiVersion: projection.sh/v1
kind: Projection
metadata:
  name: flags-staging
  namespace: app-staging
spec:
  source:
    group: ""
    version: v1
    kind: ConfigMap
    name: feature-flags
    namespace: platform
  overlay:
    annotations:
      mirror.example.com/source: platform/feature-flags
      mirror.example.com/team: platform-eng
