# Mirror a Service across namespaces.
#
# The Projection lives in the destination namespace (`team-b`) and reads
# the source Service out of `default`.
#
# This demonstrates Kind-aware stripping: the source Service's clusterIP
# is allocated by the apiserver. If projection naively copied it, the
# create at the destination would fail with "spec.clusterIP: field is
# immutable" (or worse, IP collision). projection strips clusterIP /
# clusterIPs / ipFamilies / ipFamilyPolicy from the source before write,
# letting the destination's apiserver allocate fresh values.
#
# After applying:
#   kubectl get svc -n default api -o jsonpath='{.spec.clusterIP}'      # 10.96.X.X
#   kubectl get svc -n team-b  api -o jsonpath='{.spec.clusterIP}'      # 10.96.Y.Y (different)
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-b
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: default
  annotations:
    # Opt-in required by the default allowlist source-mode.
    projection.sh/projectable: "true"
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
apiVersion: projection.sh/v1
kind: Projection
metadata:
  name: api-into-team-b
  namespace: team-b
spec:
  source:
    kind: Service
    name: api
    namespace: default
