# Mirror a ConfigMap from one namespace into another.
#
# The Projection lives in tenant-a (the destination namespace) and reads
# the ConfigMap `app-config` from `default`. Namespaced Projections always
# write into their own namespace — for cross-namespace fan-out use
# ClusterProjection.
#
# After applying this file:
#   kubectl get projections -n tenant-a
#   kubectl get configmap -n tenant-a app-config -o yaml
#
# The destination ConfigMap will carry the same .data as the source plus
# an ownership annotation `projection.sh/owned-by-projection` (the
# cluster-scoped CRD stamps `projection.sh/owned-by-cluster-projection`
# instead). Editing the source propagates to the destination in ~100ms.
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  annotations:
    # Source owner opts this ConfigMap in to projection. Required under the
    # default allowlist source-mode; harmless in permissive mode. Setting
    # this to "false" is always honored as an opt-out veto.
    projection.sh/projectable: "true"
data:
  log_level: info
  feature_flag: enabled
---
apiVersion: projection.sh/v1
kind: Projection
metadata:
  name: app-config-to-tenant-a
  namespace: tenant-a
spec:
  source:
    kind: ConfigMap
    name: app-config
    namespace: default
  # destination omitted → name defaults to source.name ("app-config"),
  # namespace is implicitly the Projection's own namespace (tenant-a).
