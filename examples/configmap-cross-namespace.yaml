# Mirror a ConfigMap from one namespace into another.
#
# After applying this file:
#   kubectl get projections
#   kubectl get configmap -n tenant-a app-config -o yaml
#
# The destination ConfigMap will carry the same .data as the source plus
# an ownership annotation `projection.be0x74a.io/owned-by`. Editing the
# source propagates to the destination in ~100ms.
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  annotations:
    # Source owner opts this ConfigMap in to projection. Required under the
    # default allowlist source-mode; harmless in permissive mode. Setting
    # this to "false" is always honored as an opt-out veto.
    projection.be0x74a.io/projectable: "true"
data:
  log_level: info
  feature_flag: enabled
---
apiVersion: projection.be0x74a.io/v1
kind: Projection
metadata:
  name: app-config-to-tenant-a
  namespace: default
spec:
  source:
    apiVersion: v1
    kind: ConfigMap
    name: app-config
    namespace: default
  destination:
    namespace: tenant-a
    # name omitted → defaults to source.name ("app-config")
