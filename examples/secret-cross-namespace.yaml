# Mirror a Secret across namespaces — the canonical "TLS cert into many
# application namespaces" case.
#
# The Projection lives in the destination namespace (`app-prod`) and reads
# the source Secret out of `cert-manager`. The source Secret is typically
# created by something else (cert-manager, external-secrets, sealed-secrets,
# etc.). Here we hand-author it for illustration.
#
# Note: projection only mirrors. It does not encrypt, rotate, or audit
# Secret access — your usual cluster-level Secret protections still apply.
---
apiVersion: v1
kind: Namespace
metadata:
  name: app-prod
---
apiVersion: v1
kind: Secret
metadata:
  name: shared-tls
  namespace: cert-manager
  annotations:
    # Opt-in required by the default allowlist source-mode.
    projection.sh/projectable: "true"
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    PLACEHOLDER
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    PLACEHOLDER
    -----END PRIVATE KEY-----
---
apiVersion: projection.sh/v1
kind: Projection
metadata:
  name: tls-into-app-prod
  namespace: app-prod
spec:
  source:
    group: ""
    version: v1
    kind: Secret
    name: shared-tls
    namespace: cert-manager
  destination:
    name: tls
