# Mirror a Secret across namespaces — the canonical "TLS cert into many
# application namespaces" case.
#
# The source Secret is typically created by something else (cert-manager,
# external-secrets, sealed-secrets, etc.). Here we hand-author it for
# illustration.
#
# Note: projection only mirrors. It does not encrypt, rotate, or audit
# Secret access — your usual cluster-level Secret protections still apply.
---
apiVersion: v1
kind: Namespace
metadata:
  name: app-prod
---
apiVersion: v1
kind: Secret
metadata:
  name: shared-tls
  namespace: cert-manager
  annotations:
    # Opt-in required by the default allowlist source-mode.
    projection.be0x74a.io/projectable: "true"
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    PLACEHOLDER
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    PLACEHOLDER
    -----END PRIVATE KEY-----
---
apiVersion: projection.be0x74a.io/v1
kind: Projection
metadata:
  name: tls-into-app-prod
  namespace: cert-manager
spec:
  source:
    apiVersion: v1
    kind: Secret
    name: shared-tls
    namespace: cert-manager
  destination:
    namespace: app-prod
    name: tls
