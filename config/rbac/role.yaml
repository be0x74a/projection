---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - projection.sh
  resources:
  - projections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - projection.sh
  resources:
  - projections/finalizers
  verbs:
  - update
- apiGroups:
  - projection.sh
  resources:
  - projections/status
  verbs:
  - get
  - patch
  - update
